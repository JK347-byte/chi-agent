<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>日和聯合診所 封面圖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Serif TC', 'Noto Sans TC', serif;
    background: #f5f9f0;
  }

  .cover {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    overflow: hidden;
  }

  /* 左側圖片區 */
  .left-panel {
    width: 860px;
    height: 1080px;
    position: relative;
    flex-shrink: 0;
  }

  .article-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
  }

  /* 圖片上的漸層遮罩 */
  .image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(30, 74, 36, 0.08) 0%,
      rgba(30, 74, 36, 0.45) 100%
    );
  }

  /* 右側內容區 */
  .right-panel {
    flex: 1;
    background: linear-gradient(155deg, #1a4a22 0%, #2e7d32 45%, #388e3c 100%);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px 80px 60px 80px;
    position: relative;
    overflow: hidden;
  }

  /* 裝飾圓圈 */
  .deco-circle-1 {
    position: absolute;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08);
    top: -120px;
    right: -100px;
  }
  .deco-circle-2 {
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.06);
    bottom: 60px;
    left: -80px;
  }

  /* Logo 區 */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 2;
  }

  .logo-icon {
    width: 54px;
    height: 54px;
    flex-shrink: 0;
  }

  .clinic-name {
    display: flex;
    flex-direction: column;
  }
  .clinic-name-zh {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.12em;
    line-height: 1.2;
  }
  .clinic-name-en {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* 主內容 */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
    padding: 40px 0;
  }

  .category-tag {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #c8e6c9;
    font-size: 14px;
    letter-spacing: 0.2em;
    padding: 6px 18px;
    border-radius: 30px;
    margin-bottom: 32px;
    width: fit-content;
  }

  .article-title {
    font-size: 54px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.3;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .article-subtitle {
    font-size: 19px;
    color: rgba(255,255,255,0.75);
    line-height: 1.8;
    margin-bottom: 44px;
    font-weight: 400;
    max-width: 640px;
  }

  /* 重點清單 */
  .key-points {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .key-point {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    color: rgba(255,255,255,0.88);
    font-size: 18px;
    line-height: 1.5;
  }

  .point-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #81c784;
    flex-shrink: 0;
    margin-top: 8px;
  }

  /* 分隔線 */
  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(to right, #81c784, rgba(129,199,132,0.2));
    border-radius: 2px;
    margin-bottom: 36px;
  }

  /* 底部資訊 */
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.12);
    padding-top: 28px;
  }

  .footer-left {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
  }

  .footer-right {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
  }

  /* 左下角標籤 */
  .image-caption {
    position: absolute;
    bottom: 32px;
    left: 32px;
    background: rgba(30, 74, 36, 0.82);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: 8px 18px;
    border-radius: 6px;
    z-index: 3;
  }
</style>
</head>
<body>
<div class="cover">

  <!-- 左側圖片 -->
  <div class="left-panel">
    <img class="article-image"
      src="assets/photos/jk_stand_present.jpg"
      alt="詹士奇醫師形象照"
    >
    <div class="image-overlay"></div>
    <div class="image-caption">✦ 耳鼻喉健康知識</div>
  </div>

  <!-- 右側內容 -->
  <div class="right-panel">
    <div class="deco-circle-1"></div>
    <div class="deco-circle-2"></div>

    <!-- Logo -->
    <div class="logo-row">
      <img class="logo-icon" src="assets/photos/rihe_logo.png" alt="日和診所 Logo" style="object-fit:contain;">

      <div class="clinic-name">
        <span class="clinic-name-zh">日和聯合診所</span>
        <span class="clinic-name-en">Rihe Integrated Clinic</span>
      </div>
    </div>

    <!-- 主內容 -->
    <div class="main-content">
      <div class="category-tag">耳鼻喉健康知識</div>
      <h1 class="article-title">
        耳垢，<br>
        其實是你耳朵的保鑣
      </h1>
      <div class="divider"></div>
      <p class="article-subtitle">
        挖耳朵不會讓耳道更乾淨，只會讓問題更複雜。
      </p>
      <div class="key-points">
        <div class="key-point">
          <div class="point-dot"></div>
          <span>耳垢會自動排出，不需要清理</span>
        </div>
        <div class="key-point">
          <div class="point-dot"></div>
          <span>挖耳朵是外耳炎最常見的原因</span>
        </div>
        <div class="key-point">
          <div class="point-dot"></div>
          <span>耳朵癢痛不是耳垢問題，要就醫</span>
        </div>
      </div>
    </div>

    <!-- 底部 -->
    <div class="footer-row">
      <div class="footer-left">日和醫療健康誌　Health Notes</div>
      <div class="footer-right">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
          <path d="M8 4v4l2.5 2.5" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        2026 · 台南鹽水
      </div>
    </div>
  </div>

</div>
</body>
</html>
