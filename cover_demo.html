<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>日和聯合診所 封面圖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    font-family: 'Noto Serif TC', 'Noto Sans TC', serif;
  }

  .cover {
    width: 1200px;
    height: 1200px;
    display: flex;
    flex-direction: column;
    background: #f5faf5;
    position: relative;
    overflow: hidden;
  }

  /* 裝飾背景 */
  .deco-circle-lg {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(46,125,50,0.1) 0%, transparent 65%);
    top: -100px;
    right: -120px;
    pointer-events: none;
  }
  .deco-circle-sm {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 2px solid rgba(46,125,50,0.1);
    bottom: 80px;
    right: 60px;
    pointer-events: none;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #14391a 0%, #2e7d32 100%);
    padding: 20px 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    height: 82px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  .clinic-name-zh {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.08em;
  }

  .clinic-name-en {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.2em;
    margin-top: 2px;
  }

  .category-tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #c8e6c9;
    font-size: 16px;
    letter-spacing: 0.15em;
    padding: 7px 22px;
    border-radius: 30px;
  }

  /* ── 主內容 ── */
  .main {
    flex: 1;
    padding: 48px 52px 36px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    position: relative;
    z-index: 2;
  }

  /* 標題區 */
  .article-title {
    font-size: 88px;
    font-weight: 900;
    color: #1a2e1a;
    line-height: 1.2;
    letter-spacing: 0.02em;
    margin-bottom: 26px;
  }

  .article-subtitle {
    font-size: 28px;
    color: #444;
    line-height: 1.7;
    font-weight: 400;
    padding-left: 20px;
    border-left: 5px solid #2e7d32;
  }

  /* 合併卡區（數據 + 重點）*/
  .key-points {
    display: flex;
    gap: 16px;
    flex: none;
    height: 380px;
    margin-top: auto;
  }

  .key-point {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    padding: 36px 30px 32px;
    border-bottom: 5px solid #2e7d32;
    box-shadow: 0 4px 18px rgba(46,125,50,0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .stat-group { display: flex; flex-direction: column; gap: 10px; }

  .stat-num {
    font-size: 80px;
    font-weight: 900;
    color: #1a4a22;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stat-num .stat-unit {
    font-size: 42px;
    font-weight: 700;
    color: #2e7d32;
    margin-left: 3px;
  }

  .stat-desc {
    font-size: 21px;
    color: #666;
    line-height: 1.5;
  }

  .point-divider {
    height: 1px;
    background: #c8e6c9;
    margin-top: 16px;
  }

  .point-dot {
    display: none;
  }

  .key-point span {
    font-size: 22px;
    color: #1a4a22;
    font-weight: 700;
    line-height: 1.5;
  }

  /* ── Footer ── */
  .footer {
    background: #14391a;
    padding: 16px 52px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    height: 58px;
  }

  .footer-left {
    font-size: 16px;
    color: #a5d6a7;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .footer-right {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="cover">

  <div class="deco-circle-lg"></div>
  <div class="deco-circle-sm"></div>

  <!-- Header -->
  <div class="header">
    <div class="logo-row">
      <img class="logo-img" src="assets/photos/rihe_logo.png" alt="Logo">
      <div>
        <div class="clinic-name-zh">日和聯合診所</div>
        <div class="clinic-name-en">RIHE INTEGRATED CLINIC</div>
      </div>
    </div>
    <div class="category-tag">偏頭痛生活管理</div>
  </div>

  <!-- 主內容 -->
  <div class="main">

    <!-- 標題 + 副標 -->
    <div>
      <h1 class="article-title">
        除了吃藥，<br>預防偏頭痛還能這樣做
      </h1>
      <p class="article-subtitle">生活地雷 ＋ 非藥物治療 ＋ 中醫輔助，一次看清楚</p>
    </div>

    <!-- 合併卡（數據 + 重點）-->
    <div class="key-points">
      <div class="key-point">
        <div class="stat-group">
          <div class="stat-num">15<span class="stat-unit">%</span></div>
          <div class="stat-desc">台灣成人偏頭痛盛行率，女性為男性三倍</div>
          <div class="point-divider"></div>
        </div>
        <span>找出個人誘發地雷：飲食、睡眠、壓力</span>
      </div>
      <div class="key-point">
        <div class="stat-group">
          <div class="stat-num">50<span class="stat-unit">%</span></div>
          <div class="stat-desc">生活調整可顯著減少發作頻率</div>
          <div class="point-divider"></div>
        </div>
        <span>規律作息＋正念減壓降低大腦敏感度</span>
      </div>
      <div class="key-point">
        <div class="stat-group">
          <div class="stat-num">4<span class="stat-unit">次</span></div>
          <div class="stat-desc">每月超過此次數建議啟動預防治療</div>
          <div class="point-divider"></div>
        </div>
        <span>針灸輔助放鬆肌肉，減少發作頻率</span>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">日和醫療健康誌 · Health Notes</div>
    <div class="footer-right">預約專線：06-6520182</div>
  </div>

</div>
</body>
</html>
